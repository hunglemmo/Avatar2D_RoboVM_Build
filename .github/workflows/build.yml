name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Thêm dòng này để chủ tịch có thể chủ động bấm nút "Run workflow" trên web mà không cần commit lại code

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Đã nâng cấp lên v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4 # Đã nâng cấp lên v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || true

    - name: Build iOS App with RoboVM
      run: ./gradlew robovmIOSDeviceApp
      
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4 # Đã nâng cấp lên v4 để sửa dứt điểm lỗi dòng 26
      with:
        name: IOSLauncher-App
        path: build/robovm/IOSLauncher.app/
