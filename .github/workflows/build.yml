name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 

    - name: Set up JDK 11
      uses: actions/setup-java@v4 
      with:
        java-version: '11'
        distribution: 'temurin'

    # Sử dụng trực tiếp hệ thống Gradle có sẵn trên máy ảo GitHub
    - name: Build iOS App with RoboVM
      run: gradle robovmIOSDeviceApp # Đã đổi từ ./gradlew thành gradle trần
      
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4 
      with:
        name: IOSLauncher-App
        path: build/robovm/IOSLauncher.app/
