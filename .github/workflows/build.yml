name: Build RoboVM IPA

on:
  workflow_dispatch: # Kích hoạt bằng tay trên giao diện web GitHub

jobs:
  build:
    runs-on: macos-latest # Sử dụng hệ máy ảo Mac mới nhất để chạy ngay lập tức

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4 # Nâng cấp lên v4

    - name: Thiết lập Java Runtimes
      uses: actions/setup-java@v4 # Nâng cấp lên v4
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Cấp quyền cho Gradle
      run: chmod +x gradlew || true

    - name: Biên dịch Java JAR sang Native iOS (.app)
      run: |
        gradle robovmCreateArchive --no-daemon

    - name: Đóng gói thành phẩm IPA sạch
      run: |
        mkdir -p build/deploy/Payload
        cp -r build/robovm/IOSLauncher.app build/deploy/Payload/
        cd build/deploy
        zip -r ../../IOSLauncher_Chuan.ipa Payload
        
    - name: Đẩy file IPA lên mục Artifacts để tải về
      uses: actions/upload-artifact@v4 # ĐÃ NÂNG CẤP LÊN V4 - SỬA LỖI BỊ CHẶN
      with:
        name: IOSLauncher-Clean-Build
        path: IOSLauncher_Chuan.ipa
