name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 

    - name: Set up JDK 17
      uses: actions/setup-java@v4 
      with:
        java-version: '17'
        distribution: 'temurin'

    # Gọi đúng lệnh build của RoboVM phiên bản mới
    - name: Build iOS App with RoboVM
      run: gradle robovmInstall
      
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4 
      with:
        name: IOSLauncher-App
        path: build/robovm/IOSLauncher.app/
