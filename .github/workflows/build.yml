name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 

    - name: Set up JDK 11
      uses: actions/setup-java@v4 
      with:
        java-version: '11' # Đã đổi từ '8' thành '11' để khớp với hệ thống GitHub
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || true

    - name: Build iOS App with RoboVM
      run: ./gradlew robovmIOSDeviceApp
      
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4 
      with:
        name: IOSLauncher-App
        path: build/robovm/IOSLauncher.app/
