name: Build iOS App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest # Thuê máy Mac ảo của GitHub

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || true

    - name: Build iOS App with RoboVM
      run: ./gradlew robovmIOSDeviceApp
      
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v3
      with:
        name: IOSLauncher-App
        path: build/robovm/IOSLauncher.app/
