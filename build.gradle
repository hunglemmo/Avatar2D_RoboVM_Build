plugins {
    id 'java'
    id 'com.mobidevelop.robovm' version '2.3.20'
}

repositories {
    mavenCentral()
    google()
}

dependencies {
    // Chỉ định chính xác phôi file JAR của bạn
    implementation files('libs/Avatar2d_AutoFull4.jar')
}

// BẮT BUỘC CÓ: Khai báo rõ mục tiêu iOS để Gradle 8.0 tự động sinh ra lệnh robovmCreateArchive
robovm {
    os = "ios"
    archs = ["thumb64"]
}
