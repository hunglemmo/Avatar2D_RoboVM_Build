buildscript {
    repositories {
        mavenCentral()
        google()
    }
    dependencies {
        // Tải bộ công cụ RoboVM trực tiếp từ kho Central
        classpath 'com.mobidevelop.robovm:robovm-gradle-plugin:2.3.20'
    }
}

apply plugin: 'java'
apply plugin: 'robovm'

repositories {
    mavenCentral()
    google()
}

dependencies {
    // Chỉ định phôi file JAR của bạn
    implementation files('libs/Avatar2d_AutoFull4.jar')
}

// Trỏ thẳng cấu hình tới file robovm.xml chuẩn của bạn
robovm {
    configFile = file('robovm.xml')
}
