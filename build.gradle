plugins {
    id 'java'
    id 'robovm' version '2.3.20' // Hoặc phiên bản RoboVM chủ tịch đang dùng
}

repositories {
    mavenCentral()
}

dependencies {
    // Nạp file jar của chủ tịch vào dự án
    implementation fileTree(dir: 'libs', include: ['*.jar'])
}

robovm {
    iosSignIdentity = ""
    iosProvisioningProfile = ""
    iosSkipSigning = true // Bỏ qua ký mã trên GitHub, về máy mình dùng ESign sau
    mainClass = "com.teamobi.avatar.AvatarLM" // CHÚ Ý: Thay bằng đường dẫn Main-Class chính xác trong file jar của chủ tịch
}
