buildscript {
    repositories {
        mavenCentral()
        google()
    }
    dependencies {
        classpath 'com.mobidevelop.robovm:robovm-gradle-plugin:2.3.20'
    }
}

apply plugin: 'java'
apply plugin: 'robovm'

repositories {
    mavenCentral()
    google()
}

dependencies {
    implementation files('libs/Avatar2d_AutoFull4.jar')
}

robovm {
    configFile = file('robovm.xml')
}
