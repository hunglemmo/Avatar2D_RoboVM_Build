buildscript {
    repositories {
        mavenCentral()
        gradlePluginPortal()
    }
    dependencies {
        classpath 'com.mobidevelop.robovm:robovm-gradle-plugin:2.3.20'
    }
}

apply plugin: 'java'
apply plugin: 'robovm'

repositories {
    mavenCentral()
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
}

// Tuyệt chiêu: Tự động giải nén toàn bộ file .jar trong thư mục libs 
// bỏ vào thư mục build chính để RoboVM quét được lớp Main Class
task unpackJar(type: Copy) {
    from {
        fileTree(dir: 'libs', include: ['*.jar']).collect { zipTree(it) }
    }
    into file("${buildDir}/classes/java/main")
}

// Bắt buộc hệ thống phải giải nén xong trước khi chạy các bước tiếp theo
classes.dependsOn unpackJar

robovm {
    iosSignIdentity = ""
    iosProvisioningProfile = ""
    iosSkipSigning = true 
}
