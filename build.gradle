buildscript {
    repositories {
        mavenCentral()
        gradlePluginPortal()
    }
    dependencies {
        classpath 'com.mobidevelop.robovm:robovm-gradle-plugin:2.3.20'
    }
}

apply plugin: 'java'
apply plugin: 'robovm'

repositories {
    mavenCentral()
}

dependencies {
    // ĐÂY LÀ ĐOẠN MÃ QUAN TRỌNG NHẤT: Tiêm thư viện J2ME giả lập
    // để RoboVM giải quyết các lớp phantom.
    implementation 'com.github.microemulator:microemulator-core:3.0.0'
    
    // Nạp file jar của chủ tịch
    implementation fileTree(dir: 'libs', include: ['*.jar'])
}

// Tuyệt chiêu giải nén JAR vẫn giữ nguyên
task unpackJar(type: Copy) {
    from {
        fileTree(dir: 'libs', include: ['*.jar']).collect { zipTree(it) }
    }
    into file("${buildDir}/classes/java/main")
}

// Ràng buộc hệ thống giải nén trước khi chạy
classes.dependsOn unpackJar

robovm {
    iosSignIdentity = ""
    iosProvisioningProfile = ""
    iosSkipSigning = true // Bỏ qua ký mã trên GitHub
}
