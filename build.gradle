buildscript {
    repositories {
        mavenCentral()
        google()
    }
    dependencies {
        classpath 'com.mobidevelop.robovm:robovm-gradle-plugin:2.3.20'
    }
}

apply plugin: 'java'
apply plugin: 'robovm'

repositories {
    mavenCentral()
}

dependencies {
    // Đọc ruột từ file JAR của bạn
    implementation files('libs/Avatar2d_AutoFull4.jar')
}
// Đã xóa hoàn toàn khối robovm {} thừa thãi gây lỗi. Hệ thống sẽ tự động gọi file robovm.xml để lấy thông tin.
