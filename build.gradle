buildscript {
    repositories {
        mavenCentral()
        gradlePluginPortal()
    }
    dependencies {
        classpath 'com.mobidevelop.robovm:robovm-gradle-plugin:2.3.20'
    }
}

// Áp dụng các plugin vào dự án
apply plugin: 'java'
apply plugin: 'robovm'

repositories {
    mavenCentral()
}

dependencies {
    // Nạp file jar sạch của chủ tịch vào dự án
    implementation fileTree(dir: 'libs', include: ['*.jar'])
}

robovm {
    iosSignIdentity = ""
    iosProvisioningProfile = ""
    iosSkipSigning = true // Bỏ qua ký mã trên GitHub
    // ĐÃ XÓA dòng mainClass thừa ở đây để hệ thống tự động đọc từ file robovm.xml
}
