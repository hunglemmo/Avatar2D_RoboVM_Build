buildscript {
    repositories {
        mavenCentral()
        gradlePluginPortal()
    }
    dependencies {
        classpath 'com.mobidevelop.robovm:robovm-gradle-plugin:2.3.20'
    }
}

apply plugin: 'java'
apply plugin: 'robovm'

repositories {
    mavenCentral()
}

dependencies {
    // ĐÃ ĐỔI: Sử dụng gói J2ME API chuẩn có sẵn 100% trên Maven Central
    implementation 'org.microemu:microemulator:2.0.4'
    
    // Nạp file jar sạch của chủ tịch
    implementation fileTree(dir: 'libs', include: ['*.jar'])
}

// Lệnh tự động giải nén file JAR
task unpackJar(type: Copy) {
    from {
        fileTree(dir: 'libs', include: ['*.jar']).collect { zipTree(it) }
    }
    into file("${buildDir}/classes/java/main")
}

classes.dependsOn unpackJar

robovm {
    iosSignIdentity = ""
    iosProvisioningProfile = ""
    iosSkipSigning = true 
}
