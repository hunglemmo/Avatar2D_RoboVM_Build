buildscript {
    repositories {
        mavenCentral()
        gradlePluginPortal()
    }
    dependencies {
        classpath 'com.mobidevelop.robovm:robovm-gradle-plugin:2.3.20'
    }
}

// Áp dụng các plugin vào dự án
apply plugin: 'java'
apply plugin: 'robovm' // ĐÃ SỬA: Đổi từ 'com.mobidevelop.robovm' thành 'robovm' ngắn gọn

repositories {
    mavenCentral()
}

dependencies {
    // Nạp file jar của chủ tịch vào dự án
    implementation fileTree(dir: 'libs', include: ['*.jar'])
}

robovm {
    iosSignIdentity = ""
    iosProvisioningProfile = ""
    iosSkipSigning = true // Bỏ qua ký mã trên GitHub
    mainClass = "com.teamobi.avatar.AvatarLM" // Tên Main-Class của game
}
