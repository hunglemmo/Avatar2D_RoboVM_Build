buildscript {
    repositories {
        mavenCentral()
        google()
    }
    dependencies {
        // Đã sửa lại ĐÚNG tên định danh máy chủ chuẩn của RoboVM
        classpath 'com.mobidevelop.robovm:robovm-gradle-plugin:2.3.20'
    }
}

apply plugin: 'java'
apply plugin: 'robovm'

repositories {
    mavenCentral()
}

dependencies {
    implementation files('libs/Avatar2d_AutoFull4.jar')
}

robovm {
    executableName = "IOSLauncher"
    mainClass = "hero.class2" 
}
